name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact="history-to-md-${version}-${{ matrix.target }}"
          mkdir -p dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            powershell -Command "Compress-Archive -Path target/${{ matrix.target }}/release/history-to-md.exe -DestinationPath dist/${artifact}.zip"
          else
            tar -C "target/${{ matrix.target }}/release" -czf "dist/${artifact}.tar.gz" history-to-md
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: history-to-md-${{ matrix.target }}
          path: dist/*
